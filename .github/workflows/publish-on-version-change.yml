# gradle.properties의 VERSION 변경 시 자동으로 Maven Central에 배포하는 워크플로우
name: Publish to Maven Central on Version Change

# 트리거 조건: release 브랜치에서 gradle.properties 파일이 변경된 경우
on:
  push:
    branches:
      - 'release/**'
    paths:
      - 'gradle.properties'

permissions:
  contents: write

jobs:
  # 첫 번째 작업: VERSION이 실제로 변경되었는지 확인
  check-version-change:
    runs-on: ubuntu-latest
    outputs:
      version-changed: ${{ steps.version-check.outputs.changed }}
      new-version: ${{ steps.version-check.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if VERSION changed
        id: version-check
        run: |
          CURRENT_VERSION=$(grep "^VERSION=" gradle.properties | cut -d '=' -f 2)
          echo "Current version: $CURRENT_VERSION"

          git checkout HEAD~1 -- gradle.properties 2>/dev/null || echo "No previous version found"
          PREVIOUS_VERSION=$(grep "^VERSION=" gradle.properties | cut -d '=' -f 2 2>/dev/null || echo "")
          echo "Previous version: $PREVIOUS_VERSION"

          git checkout HEAD -- gradle.properties

          if [ "$CURRENT_VERSION" != "$PREVIOUS_VERSION" ] && [ -n "$CURRENT_VERSION" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
            echo "Version changed from $PREVIOUS_VERSION to $CURRENT_VERSION"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Version not changed"
          fi

  # 두 번째 작업: 버전이 변경된 경우에만 Maven Central에 배포
  publish:
    needs: check-version-change
    if: needs.check-version-change.outputs.version-changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # runtime 배포
      - name: Publish runtime to Maven Central
        run: ./gradlew :runtime:publishAndReleaseToMavenCentral
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}

      # compiler 배포 — 지원하는 모든 Kotlin 버전별로 빌드 및 배포
      # 2.3.x 빌드 시 Kotlin 컴파일러 버전도 맞춰야 metadata 호환성 문제가 없음
      - name: Publish compiler for all supported Kotlin versions
        run: |
          KOTLIN_VERSIONS=("2.1.21" "2.2.0" "2.2.10" "2.2.20" "2.2.21" "2.3.0" "2.3.10" "2.3.20")
          TOML_FILE="gradle/libs.versions.toml"
          ORIGINAL_KOTLIN=$(grep '^kotlin = ' "$TOML_FILE" | sed 's/kotlin = "\(.*\)"/\1/')
          for VER in "${KOTLIN_VERSIONS[@]}"; do
            echo "=========================================="
            echo "Publishing compiler for Kotlin $VER"
            echo "=========================================="
            # 2.3.x 빌드 시 빌드 컴파일러도 2.3.0으로 변경
            if [[ "$VER" == 2.3.* ]]; then
              sed -i "s/^kotlin = \".*\"/kotlin = \"2.3.0\"/" "$TOML_FILE"
            else
              sed -i "s/^kotlin = \".*\"/kotlin = \"$ORIGINAL_KOTLIN\"/" "$TOML_FILE"
            fi
            ./gradlew :compiler:clean :compiler:publishAndReleaseToMavenCentral \
              -PtargetKotlinVersion="$VER"
          done
          # 원래 Kotlin 버전 복원
          sed -i "s/^kotlin = \".*\"/kotlin = \"$ORIGINAL_KOTLIN\"/" "$TOML_FILE"
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}

      # gradle-plugin 배포 (included build이므로 별도 실행)
      - name: Publish gradle-plugin to Maven Central
        working-directory: gradle-plugin
        run: ../gradlew publishAndReleaseToMavenCentral
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}

      # GitHub Release 생성
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.check-version-change.outputs.new-version }}
          name: Release ${{ needs.check-version-change.outputs.new-version }}
          body: |
            SDK version updated to ${{ needs.check-version-change.outputs.new-version }}

            Published to Maven Central automatically.

            **사용 방법**
            - 자세한 사용법은 [README](https://github.com/${{ github.repository }}/blob/main/README.md)를 참고하세요.

          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
