# gradle.properties의 VERSION 변경 시 자동으로 Maven Central에 배포하는 워크플로우
name: Publish to Maven Central on Version Change

on:
  push:
    branches:
      - 'release/**'
    paths:
      - 'gradle.properties'

permissions:
  contents: write

env:
  GROUP_ARG: ${{ vars.GROUP_OVERRIDE && format('-PGROUP={0}', vars.GROUP_OVERRIDE) || '' }}

jobs:
  check-version-change:
    runs-on: ubuntu-latest
    outputs:
      version-changed: ${{ steps.version-check.outputs.changed }}
      new-version: ${{ steps.version-check.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if VERSION changed
        id: version-check
        run: |
          CURRENT_VERSION=$(grep "^VERSION=" gradle.properties | cut -d '=' -f 2)
          echo "Current version: $CURRENT_VERSION"

          git checkout HEAD~1 -- gradle.properties 2>/dev/null || echo "No previous version found"
          PREVIOUS_VERSION=$(grep "^VERSION=" gradle.properties | cut -d '=' -f 2 2>/dev/null || echo "")
          echo "Previous version: $PREVIOUS_VERSION"

          git checkout HEAD -- gradle.properties

          if [ "$CURRENT_VERSION" != "$PREVIOUS_VERSION" ] && [ -n "$CURRENT_VERSION" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
            echo "Version changed from $PREVIOUS_VERSION to $CURRENT_VERSION"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Version not changed"
          fi

  publish-runtime:
    needs: check-version-change
    if: needs.check-version-change.outputs.version-changed == 'true' && vars.MAVEN_CENTRAL_ENABLED != 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - run: chmod +x gradlew
      - name: Publish runtime
        run: ./gradlew :runtime:publishAndReleaseToMavenCentral ${{ env.GROUP_ARG }}
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}

  publish-compiler:
    needs: check-version-change
    if: needs.check-version-change.outputs.version-changed == 'true' && vars.MAVEN_CENTRAL_ENABLED != 'false'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        kotlin: ["2.1.21", "2.2.0", "2.2.10", "2.2.20", "2.2.21", "2.3.0", "2.3.10", "2.3.20"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - run: chmod +x gradlew
      - name: Set Kotlin compiler version for 2.3.x
        if: startsWith(matrix.kotlin, '2.3')
        run: sed -i "s/^kotlin = \".*\"/kotlin = \"2.3.0\"/" gradle/libs.versions.toml
      - name: Publish compiler for Kotlin ${{ matrix.kotlin }}
        run: |
          ./gradlew :compiler:publishAndReleaseToMavenCentral \
            -PtargetKotlinVersion="${{ matrix.kotlin }}" \
            ${{ env.GROUP_ARG }}
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}

  publish-gradle-plugin:
    needs: check-version-change
    if: needs.check-version-change.outputs.version-changed == 'true' && vars.MAVEN_CENTRAL_ENABLED != 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - run: chmod +x gradlew
      - name: Publish gradle-plugin
        working-directory: gradle-plugin
        run: ../gradlew publishAndReleaseToMavenCentral ${{ env.GROUP_ARG }}
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}

  create-release:
    needs: [check-version-change, publish-runtime, publish-compiler, publish-gradle-plugin]
    if: needs.check-version-change.outputs.version-changed == 'true' && vars.MAVEN_CENTRAL_ENABLED != 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.check-version-change.outputs.new-version }}
          name: Release ${{ needs.check-version-change.outputs.new-version }}
          body: |
            SDK version updated to ${{ needs.check-version-change.outputs.new-version }}

            Published to Maven Central automatically.

            **사용 방법**
            - 자세한 사용법은 [README](https://github.com/${{ github.repository }}/blob/main/README.md)를 참고하세요.

          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
