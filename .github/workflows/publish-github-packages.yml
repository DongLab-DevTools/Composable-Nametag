# gradle.properties의 VERSION 변경 시 자동으로 GitHub Packages에 배포하는 워크플로우
# GROUP은 repository variable(GROUP_OVERRIDE)로 오버라이드 가능
# Settings → Secrets and variables → Actions → Variables 에서 설정
name: Publish to GitHub Packages on Version Change

on:
  push:
    branches:
      - 'release/**'
    paths:
      - 'gradle.properties'

permissions:
  contents: write
  packages: write

env:
  GROUP_ARG: ${{ vars.GROUP_OVERRIDE && format('-PGROUP={0}', vars.GROUP_OVERRIDE) || '' }}

jobs:
  check-version-change:
    runs-on: ubuntu-latest
    outputs:
      version-changed: ${{ steps.version-check.outputs.changed }}
      new-version: ${{ steps.version-check.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if VERSION changed
        id: version-check
        run: |
          CURRENT_VERSION=$(grep "^VERSION=" gradle.properties | cut -d '=' -f 2)
          echo "Current version: $CURRENT_VERSION"

          git checkout HEAD~1 -- gradle.properties 2>/dev/null || echo "No previous version found"
          PREVIOUS_VERSION=$(grep "^VERSION=" gradle.properties | cut -d '=' -f 2 2>/dev/null || echo "")
          echo "Previous version: $PREVIOUS_VERSION"

          git checkout HEAD -- gradle.properties

          if [ "$CURRENT_VERSION" != "$PREVIOUS_VERSION" ] && [ -n "$CURRENT_VERSION" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
            echo "Version changed from $PREVIOUS_VERSION to $CURRENT_VERSION"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Version not changed"
          fi

  publish:
    needs: check-version-change
    if: needs.check-version-change.outputs.version-changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # runtime 배포
      - name: Publish runtime to GitHub Packages
        run: ./gradlew :runtime:publishMavenPublicationToGitHubPackagesRepository ${{ env.GROUP_ARG }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # compiler 배포 — 지원하는 모든 Kotlin 버전별로 빌드 및 배포
      # 2.3.x 빌드 시 Kotlin 컴파일러 버전도 맞춰야 metadata 호환성 문제가 없음
      - name: Publish compiler for all supported Kotlin versions
        run: |
          KOTLIN_VERSIONS=("2.1.21" "2.2.0" "2.2.10" "2.2.20" "2.2.21" "2.3.0" "2.3.10" "2.3.20")
          TOML_FILE="gradle/libs.versions.toml"
          ORIGINAL_KOTLIN=$(grep '^kotlin = ' "$TOML_FILE" | sed 's/kotlin = "\(.*\)"/\1/')
          for VER in "${KOTLIN_VERSIONS[@]}"; do
            echo "=========================================="
            echo "Publishing compiler for Kotlin $VER"
            echo "=========================================="
            if [[ "$VER" == 2.3.* ]]; then
              sed -i "s/^kotlin = \".*\"/kotlin = \"2.3.0\"/" "$TOML_FILE"
            else
              sed -i "s/^kotlin = \".*\"/kotlin = \"$ORIGINAL_KOTLIN\"/" "$TOML_FILE"
            fi
            ./gradlew :compiler:clean :compiler:publishMavenPublicationToGitHubPackagesRepository \
              -PtargetKotlinVersion="$VER" \
              ${{ env.GROUP_ARG }}
          done
          sed -i "s/^kotlin = \".*\"/kotlin = \"$ORIGINAL_KOTLIN\"/" "$TOML_FILE"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # gradle-plugin 배포 (included build이므로 별도 실행)
      - name: Publish gradle-plugin to GitHub Packages
        working-directory: gradle-plugin
        run: ../gradlew publishPluginMavenPublicationToGitHubPackagesRepository ${{ env.GROUP_ARG }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
