# gradle.propertiesýŁś VERSION Ű│Çŕ▓Ż ýőť ý×ÉŰĆÖýť╝Űíť GitHub PackagesýŚÉ Ű░░ÝĆČÝĽśŰŐö ýŤîÝüČÝöîŰíťýÜ░
# GROUPýŁÇ repository variable(GROUP_OVERRIDE)Űíť ýśĄŰ▓äŰŁ╝ýŁ┤Űôť ŕ░ÇŰŐą
# Settings Ôćĺ Secrets and variables Ôćĺ Actions Ôćĺ Variables ýŚÉýäť ýäĄýáĽ
name: Publish to GitHub Packages on Version Change

on:
  push:
    branches:
      - 'release/**'
    paths:
      - 'gradle.properties'

permissions:
  contents: write
  packages: write

env:
  GROUP_ARG: ${{ vars.GROUP_OVERRIDE && format('-PGROUP={0}', vars.GROUP_OVERRIDE) || '' }}

jobs:
  check-version-change:
    runs-on: ubuntu-latest
    outputs:
      version-changed: ${{ steps.version-check.outputs.changed }}
      new-version: ${{ steps.version-check.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if VERSION changed
        id: version-check
        run: |
          CURRENT_VERSION=$(grep "^VERSION=" gradle.properties | cut -d '=' -f 2)
          echo "Current version: $CURRENT_VERSION"

          git checkout HEAD~1 -- gradle.properties 2>/dev/null || echo "No previous version found"
          PREVIOUS_VERSION=$(grep "^VERSION=" gradle.properties | cut -d '=' -f 2 2>/dev/null || echo "")
          echo "Previous version: $PREVIOUS_VERSION"

          git checkout HEAD -- gradle.properties

          if [ "$CURRENT_VERSION" != "$PREVIOUS_VERSION" ] && [ -n "$CURRENT_VERSION" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
            echo "Version changed from $PREVIOUS_VERSION to $CURRENT_VERSION"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Version not changed"
          fi

  publish-runtime:
    needs: check-version-change
    if: needs.check-version-change.outputs.version-changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - run: chmod +x gradlew
      - name: Publish runtime
        run: ./gradlew :runtime:publishMavenPublicationToGitHubPackagesRepository ${{ env.GROUP_ARG }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-compiler:
    needs: check-version-change
    if: needs.check-version-change.outputs.version-changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        kotlin: ["2.1.21", "2.2.0", "2.2.10", "2.2.20", "2.2.21", "2.3.0", "2.3.10", "2.3.20"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - run: chmod +x gradlew
      - name: Set Kotlin compiler version for 2.3.x
        if: startsWith(matrix.kotlin, '2.3')
        run: sed -i "s/^kotlin = \".*\"/kotlin = \"2.3.0\"/" gradle/libs.versions.toml
      - name: Publish compiler for Kotlin ${{ matrix.kotlin }}
        run: |
          ./gradlew :compiler:publishMavenPublicationToGitHubPackagesRepository \
            -PtargetKotlinVersion="${{ matrix.kotlin }}" \
            ${{ env.GROUP_ARG }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-gradle-plugin:
    needs: check-version-change
    if: needs.check-version-change.outputs.version-changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
      - run: chmod +x gradlew
      - name: Publish gradle-plugin
        working-directory: gradle-plugin
        run: ../gradlew publishPluginMavenPublicationToGitHubPackagesRepository ${{ env.GROUP_ARG }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
