# 개인 repo에 push 시 회사 repo로 자동 미러링
name: Mirror to Company Repo

on: push

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Debug - Check secrets
        run: |
          if [ -z "${{ secrets.COMPANY_REPO }}" ]; then
            echo "❌ COMPANY_REPO secret is empty!"
          else
            echo "✅ COMPANY_REPO is set (length: ${#COMPANY_REPO})"
            echo "Value (masked): ${{ secrets.COMPANY_REPO }}"
          fi
          if [ -z "${{ secrets.COMPANY_REPO_TOKEN }}" ]; then
            echo "❌ COMPANY_REPO_TOKEN secret is empty!"
          else
            echo "✅ COMPANY_REPO_TOKEN is set"
          fi
        env:
          COMPANY_REPO: ${{ secrets.COMPANY_REPO }}

      - name: Push to company repo
        run: |
          REPO="${{ secrets.COMPANY_REPO }}"
          echo "Target repo: ${#REPO} chars"
          git remote add company "https://x-access-token:${{ secrets.COMPANY_REPO_TOKEN }}@github.com/${REPO}.git"
          git remote -v
          git push company --all --force
          git push company --tags --force
